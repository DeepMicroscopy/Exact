{% load static %}
{% load i18n %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/png" href="{% static 'symbols/exact_small.ico' %}">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
  <title>EXACT — Signed out</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f14;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(170,15,234,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(90,10,160,.20) 0%, transparent 55%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .logout-card {
      width: 100%;
      max-width: 380px;
      padding: 0 16px;
      text-align: center;
    }

    .logout-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,.55), 0 0 0 1px rgba(170,15,234,.12);
      backdrop-filter: blur(12px);
    }

    .logout-logo {
      display: block;
      margin: 0 auto 8px;
      height: 44px;
    }

    .logout-tagline {
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.30);
      margin-bottom: 32px;
    }

    .logout-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(74,222,128,.12);
      border: 1px solid rgba(74,222,128,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 1.3rem;
      color: #4ade80;
    }

    .logout-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e0e0ea;
      margin-bottom: 6px;
    }

    .logout-sub {
      font-size: .82rem;
      color: rgba(255,255,255,.35);
      margin-bottom: 28px;
    }

    .btn-signin {
      display: inline-block;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .03em;
      cursor: pointer;
      text-decoration: none !important;
      background: linear-gradient(135deg, #aa0fea 0%, #7c09b0 100%);
      color: #fff !important;
      box-shadow: 0 4px 18px rgba(170,15,234,.35);
      transition: opacity .15s, transform .1s;
    }
    .btn-signin:hover { opacity: .88; }
    .btn-signin:active { transform: scale(.98); }

    .logout-copy {
      margin-top: 20px;
      font-size: .68rem;
      color: rgba(255,255,255,.15);
    }
  </style>
</head>
<body>

<div class="logout-card">
  <div class="logout-box">
    <img src="{% static 'images/logo.svg' %}" class="logout-logo" alt="EXACT">
    <p class="logout-tagline">Label Server</p>

    <div class="logout-icon">
      <i class="fa fa-check"></i>
    </div>
    <div class="logout-title">You've been signed out</div>
    <div class="logout-sub">Your session has ended securely.</div>

    <a href="{% url 'login' %}" class="btn-signin">Sign in again</a>
  </div>
  <p class="logout-copy">EXACT Label Server</p>
</div>

</body>
</html>
